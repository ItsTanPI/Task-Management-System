<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="authSection" class="section active">
            <h1>Task Management System</h1>
            
            <div id="authMessage" class="message"></div>

            <div class="auth-tabs">
                <button class="auth-tab-btn active" onclick="switchAuthTab('login')">Login</button>
                <button class="auth-tab-btn" onclick="switchAuthTab('signup')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <input type="text" id="loginUsername" placeholder="Username" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>

            <!-- Signup Form -->
            <form id="registerForm" class="auth-form">
                <input type="text" id="regUsername" placeholder="Username" required>
                <input type="password" id="regPassword" placeholder="Password" required>
                <input type="password" id="regPasswordConfirm" placeholder="Confirm Password" required>
                <button type="submit">Sign Up</button>
            </form>
        </div>

        <div id="mainSection" class="section">
            <div class="header">
                <h1>Tasks</h1>
                <div>
                    <span class="user-info">User: <strong id="currentUser"></strong></span>
                    <button onclick="logout()" style="margin-left: 10px;">Logout</button>
                </div>
            </div>

            <div id="taskMessage" class="message"></div>

            <h2>Create Task</h2>
            <form id="taskForm">
                <input type="text" id="taskTitle" placeholder="Task Title" required>
                <textarea id="taskDescription" placeholder="Task Description" rows="3"></textarea>
                <select id="taskStatus">
                    <option value="pending">Pending</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
                <button type="submit">Add Task</button>
            </form>

            <h2>Filter Tasks</h2>
            <div class="filter-buttons">
                <button class="active" onclick="filterTasks('all')">All</button>
                <button onclick="filterTasks('pending')">Pending</button>
                <button onclick="filterTasks('in-progress')">In Progress</button>
                <button onclick="filterTasks('completed')">Completed</button>
            </div>

            <h2>Your Tasks</h2>
            <div id="tasksList"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
